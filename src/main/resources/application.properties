kakaopay.secret-key=DEVDD8B546BB1ED39551265A7BC06276DEAC153B
kakaopay.ready-url=https://open-api.kakaopay.com/online/v1/payment/ready
kakaopay.approve-url=https://open-api.kakaopay.com/online/v1/payment/approve

# 내 사이트 기준 URL
app.base-url=http://localhost:8181

# true 시 기동 시 데모 회원 seedmem001~100 생성 (admin/aaa1111 제외 회원 정리 후 랜덤 데이터 시드). 비밀번호 Seed1234.
# 이미 seedmem001이 있으면 스킵한다. 다시 시드하려면 아래 force 를 true 로 한 번 켠 뒤 기동하고, 끝나면 false 로 돌려도 된다.
app.seed.demo-members=false
app.seed.demo-members.force=false
# true 시 기동 시 큐레이션 연습생 동기화(지정 목록 외 연습생 삭제 포함). 기본 false 권장.
