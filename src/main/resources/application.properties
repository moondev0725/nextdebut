spring.security.oauth2.client.provider.naver.user-name-attribute=response

logging.level.org.springframework.security=INFO

# Chat choice ML predictor (FastAPI)
# threshold: 소프트맥스 최댓값 기준 (5지선다에서 균등 분포면 ~0.2 근처 → 과도하게 높이면 적용률 급감)
app.ml.enabled=true
app.ml.predict-url=http://localhost:8000/predict-choice
app.ml.threshold=0.20
# top1-top2 마진이 충분하면, 확신도가 threshold보다 약간 낮아도 ML 허용(과적용 완화용 보조 조건)
app.ml.accept-if-margin=true
app.ml.secondary-min-confidence=0.15
app.ml.secondary-min-top-gap=0.015
# C/D/SPECIAL(팀웍/멘탈/스타)처럼 상대적으로 희소한 키는 임계값을 소폭 완화
app.ml.threshold-non-primary-delta=0.02
app.ml.timeout-ms=2000
app.ml.training-log-enabled=true
app.ml.training-log-path=python-ml/data/chat_choice_training.jsonl
