spring.security.oauth2.client.registration.facebook.client-secret=${OAUTH_FACEBOOK_CLIENT_SECRET:facebook-secret-not-set}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Naver — 네이버 개발자센터 애플리케이션
spring.security.oauth2.client.registration.naver.client-id=${OAUTH_NAVER_CLIENT_ID:naver-client-not-set}
spring.security.oauth2.client.registration.naver.client-secret=${OAUTH_NAVER_CLIENT_SECRET:naver-secret-not-set}
spring.security.oauth2.client.registration.naver.client-name=Naver
