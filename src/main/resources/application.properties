spring.application.name=projectx

# encoding (Spring Boot 4: spring.servlet.encoding)
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force-request=true
spring.servlet.encoding.force-response=true

# jsp view resolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# /main 등 컨트롤러 경로가 정적 리소스(/**)로 오인되지 않도록 기본 정적 매핑 끔 → WebConfig에서 필요한 경로만 등록
spring.web.resources.add-mappings=false

# port
server.port=8181
server.compression.enabled=true
server.compression.min-response-size=2048
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,image/svg+xml

# DB - H2 파일 저장 (서버 재시작해도 데이터 유지)
# AUTO_SERVER=TRUE: 여러 JVM/터미널이 같은 DB 파일에 붙을 수 있음 (embedded 잠금 완화).
# H2 제약: AUTO_SERVER 와 DB_CLOSE_ON_EXIT=FALSE 는 동시 사용 불가 → DB_CLOSE_ON_EXIT=TRUE 로 맞춤.
spring.datasource.url=jdbc:h2:file:./data/projectxdb;MODE=Oracle;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 연결 실패 시에도 Dialect 추론 오류를 줄이기 위함
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 콘솔 (Spring Boot 7.x용 설정)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.sql.init.mode=always

# upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# AI 챗봇 (WebSocket /ws/chat) — @Primary 빈은 GeminiClient (외부 LLM은 Gemini만 사용)
# 비밀키: src/main/resources/application-local.properties 에 gemini.api-key=... 또는
# GEMINI_API_KEY 환경변수를 application-local에서 ${GEMINI_API_KEY:} 로 참조
# 주의: 이 파일에 gemini.api-key= 를 두면 import된 application-local 보다 나중에 적용되어 키가 지워질 수 있음
spring.config.import=optional:classpath:application-local.properties

# Gemini (챗봇 WebSocket /ws/chat + 게임 내레이션 공통). 키는 application-local 또는 GEMINI_API_KEY 등 환경변수
gemini.model=gemini-2.5-flash
# OpenAI·Anthropic 클라이언트 빈은 기본 미등록. 필요 시 아래를 true 로 한 뒤 API 키 설정
# openai.enabled=true
# anthropic.enabled=true

# 게임 지문·멤버 대사: false면 Gemini 호출 없이 DB(NarrationFallbackSituation 등) 폴백만 사용
game.narration.use-gemini=false
# 보조 키(선택): 1번 키가 429(무료 한도 초과)면 gemini.api-key-2로 자동 전환 (동일 Gemini API)
# gemini.api-key-2=
# openai.api-key=
# openai.model=gpt-4o-mini
# anthropic.api-key=

