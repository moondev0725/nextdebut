# Google — Google Cloud Console OAuth 2.0 클라이언트 (웹). 기본값은 미설정 자리표시자이며, 로컬에서 실제 값으로 교체하세요.
spring.security.oauth2.client.registration.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:google-client-not-set.apps.googleusercontent.com}
