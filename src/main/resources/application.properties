# true 시 기동 시 팬미팅 데모 글 30개 삽입(마감 10 + 진행중 20, 참여방식 4종 균등).
app.seed.fanmeeting-demo=false
# true 시 기존 팬미팅 게시글의 PARTICIPANTS가 비어 있으면 랜덤 참여자를 채워 넣음.
